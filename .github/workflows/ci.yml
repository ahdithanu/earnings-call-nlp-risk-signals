name: CI

# Runs the unit-test suite on every PR and on pushes to non-main branches.
# The suite is offline (it exercises src/ against the committed lexicons and
# small in-memory frames), so no dataset download or network access is needed.

on:
  pull_request:
  push:
    branches-ignore:
      - main   # main lands via PRs, which already run this — avoid double runs

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q
